<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gammon — Theme Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0b110e; --chrome:#101b16; --chrome-2:#16241d;
    --line:rgba(233,222,196,.12); --line-2:rgba(233,222,196,.22);
    --cream:#f4eedf; --muted:#93a89b; --gold:#e0ad4e; --gold-2:#f0c873;
    --like:#43b581; --dislike:#e0574c; --bar:60px; --pills:52px;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--cream);font-family:"Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;display:flex;flex-direction:column;overflow:hidden}
  a{color:inherit;text-decoration:none}
  button{font-family:inherit;cursor:pointer}

  /* ===== top chrome ===== */
  header{flex:none;background:linear-gradient(180deg,var(--chrome),var(--chrome-2));border-bottom:1px solid var(--line);z-index:20}
  .row1{height:var(--bar);display:flex;align-items:center;gap:16px;padding:0 16px}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Fraunces";font-weight:700;font-size:18px;white-space:nowrap}
  .brand .logo{width:28px;height:28px;flex:none}
  .brand b{color:var(--gold)}
  .brand small{font-family:"Inter";font-weight:600;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-left:2px}

  .nav-current{display:flex;align-items:center;gap:12px;margin-left:6px;min-width:0}
  .arrow{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:rgba(244,238,223,.03);color:var(--cream);
    display:grid;place-items:center;transition:.2s;flex:none}
  .arrow:hover{background:rgba(244,238,223,.1);border-color:var(--gold)}
  .cur{min-width:0}
  .cur .name{font-family:"Fraunces";font-weight:600;font-size:16px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cur .sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cur .idx{color:var(--gold)}

  .spacer{flex:1}

  .verdict{display:flex;align-items:center;gap:8px}
  .vbtn{display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 15px;border-radius:999px;
    border:1px solid var(--line-2);background:rgba(244,238,223,.03);color:var(--cream);font-weight:600;font-size:14px;transition:.18s}
  .vbtn svg{width:17px;height:17px}
  .vbtn.like:hover{border-color:var(--like);color:var(--like)}
  .vbtn.dislike:hover{border-color:var(--dislike);color:var(--dislike)}
  .vbtn.like.on{background:var(--like);border-color:var(--like);color:#06231a}
  .vbtn.dislike.on{background:var(--dislike);border-color:var(--dislike);color:#2a0906}

  .tool{width:38px;height:38px;border-radius:10px;border:1px solid var(--line-2);background:rgba(244,238,223,.03);color:var(--cream);display:grid;place-items:center;transition:.18s}
  .tool:hover{background:rgba(244,238,223,.1);border-color:var(--gold)}
  .picks-btn{width:auto;padding:0 15px;gap:8px;display:inline-flex;align-items:center;font-weight:600;font-size:14px}
  .picks-btn .badge{background:var(--gold);color:#241804;border-radius:999px;font-size:11px;font-weight:700;min-width:18px;height:18px;padding:0 5px;display:grid;place-items:center}

  /* ===== pills strip ===== */
  .row2{height:var(--pills);display:flex;align-items:center;gap:8px;padding:0 16px 8px;overflow-x:auto;overflow-y:hidden;scrollbar-width:thin}
  .row2::-webkit-scrollbar{height:6px}.row2::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px}
  .pill{flex:none;display:inline-flex;align-items:center;gap:8px;height:34px;padding:0 13px;border-radius:999px;
    border:1px solid var(--line);background:rgba(244,238,223,.03);color:var(--cream);font-size:13px;font-weight:600;white-space:nowrap;transition:.18s;position:relative}
  .pill:hover{border-color:var(--line-2);background:rgba(244,238,223,.07)}
  .pill.active{border-color:var(--gold);background:rgba(224,173,78,.14);color:var(--gold-2)}
  .pill .sw{width:13px;height:13px;border-radius:4px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.25)}
  .pill .num{opacity:.55;font-variant-numeric:tabular-nums}
  .pill .mark{width:15px;height:15px;border-radius:50%;display:none;place-items:center;font-size:10px;font-weight:800}
  .pill.liked .mark{display:grid;background:var(--like);color:#06231a}
  .pill.disliked .mark{display:grid;background:var(--dislike);color:#2a0906}

  /* ===== stage ===== */
  .stage{flex:1;min-height:0;position:relative;background:#0a100d}
  .stage iframe{position:absolute;inset:0;width:100%;height:100%;border:0;background:#0a100d}
  .stage iframe:not(.show){display:none}
  .loading{position:absolute;inset:0;display:grid;place-items:center;z-index:5;pointer-events:none;transition:opacity .3s}
  .loading.hide{opacity:0}
  .spin{width:34px;height:34px;border:3px solid var(--line-2);border-top-color:var(--gold);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:6;font-size:12px;color:var(--muted);
    background:rgba(11,17,14,.82);backdrop-filter:blur(8px);border:1px solid var(--line);padding:7px 14px;border-radius:999px;
    display:flex;gap:12px;align-items:center;transition:opacity .4s}
  .hint kbd{background:rgba(244,238,223,.1);border:1px solid var(--line-2);border-radius:5px;padding:1px 6px;font-family:inherit;font-size:11px}
  .hint.gone{opacity:0;pointer-events:none}

  /* ===== picks overlay ===== */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(6,10,8,.72);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;padding:24px}
  .overlay.open{display:flex}
  .panel{width:min(680px,100%);max-height:86vh;overflow:auto;background:linear-gradient(180deg,var(--chrome-2),var(--chrome));
    border:1px solid var(--line-2);border-radius:18px;box-shadow:0 40px 90px -30px #000}
  .panel-head{position:sticky;top:0;background:var(--chrome-2);display:flex;align-items:center;justify-content:space-between;padding:22px 24px 16px;border-bottom:1px solid var(--line)}
  .panel-head h2{font-family:"Fraunces";font-weight:600;font-size:22px;margin:0}
  .panel-head .x{width:34px;height:34px;border-radius:9px;border:1px solid var(--line-2);background:none;color:var(--cream);display:grid;place-items:center}
  .panel-body{padding:18px 24px 24px}
  .pcol h3{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:18px 0 10px;display:flex;align-items:center;gap:8px}
  .pcol:first-child h3{margin-top:0}
  .prow{display:flex;align-items:center;gap:12px;padding:9px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:8px;transition:.15s}
  .prow:hover{border-color:var(--line-2);background:rgba(244,238,223,.03)}
  .prow .sw{width:20px;height:20px;border-radius:6px;flex:none;box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)}
  .prow .pn{flex:1;min-width:0}
  .prow .pn b{font-weight:600;font-size:15px}
  .prow .pn span{display:block;font-size:12px;color:var(--muted)}
  .prow .go{font-size:12.5px;font-weight:600;color:var(--gold);border:1px solid var(--line-2);border-radius:8px;padding:6px 11px;background:none}
  .empty{color:var(--muted);font-size:14px;font-style:italic;padding:2px 0 6px}
  .panel-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;padding-top:18px;border-top:1px solid var(--line)}
  .pa{display:inline-flex;align-items:center;gap:8px;font-weight:600;font-size:14px;padding:11px 16px;border-radius:10px;border:1px solid var(--line-2);background:rgba(244,238,223,.03);color:var(--cream)}
  .pa.primary{background:linear-gradient(180deg,var(--gold-2),var(--gold));color:#241804;border-color:transparent}
  .pa.danger:hover{border-color:var(--dislike);color:var(--dislike)}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);z-index:80;background:var(--gold);color:#241804;
    font-weight:700;font-size:14px;padding:11px 20px;border-radius:999px;opacity:0;transition:.3s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:720px){
    :root{--bar:56px}
    .brand small,.cur .sub{display:none}
    .vbtn{padding:0 12px}.vbtn span.lbl{display:none}
    .picks-btn span.lbl{display:none}
    .hint{display:none}
  }
</style>
</head>
<body>
<header>
  <div class="row1">
    <a class="brand" href="../index.html" title="Back to live homepage">
      <svg class="logo" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1.5" y="1.5" width="37" height="37" rx="9" fill="#12241b" stroke="#e0ad4e" stroke-width="2"/>
        <path d="M7 7 L13 7 L10 21 Z" fill="#e0ad4e"/><path d="M15 7 L21 7 L18 21 Z" fill="#b9492f"/><path d="M23 7 L29 7 L26 21 Z" fill="#e0ad4e"/>
        <circle cx="32" cy="29" r="5" fill="#f4eedf"/><circle cx="32" cy="29" r="1.3" fill="#12241b"/>
      </svg>
      Gammon<b>.</b><small>Theme&nbsp;Studio</small>
    </a>

    <div class="nav-current">
      <button class="arrow" id="prev" title="Previous (left arrow)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <button class="arrow" id="next" title="Next (right arrow)">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M9 18l6-6-6-6"/></svg>
      </button>
      <div class="cur">
        <div class="name"><span class="idx" id="curIdx">01</span> · <span id="curName">Heritage Club</span></div>
        <div class="sub" id="curSub">Felt-green &amp; gold, heritage serif</div>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="verdict">
      <button class="vbtn like" id="likeBtn" title="Like (L)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10v11M2 13v6a2 2 0 0 0 2 2h13.5a2 2 0 0 0 2-1.7l1.2-8A2 2 0 0 0 19.7 9H14V5a2.5 2.5 0 0 0-4.8-1L7 10"/></svg>
        <span class="lbl">Like</span>
      </button>
      <button class="vbtn dislike" id="dislikeBtn" title="Dislike (D)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 14V3M22 11V5a2 2 0 0 0-2-2H6.5a2 2 0 0 0-2 1.7l-1.2 8A2 2 0 0 0 5.3 15H11v4a2.5 2.5 0 0 0 4.8 1L17 14"/></svg>
        <span class="lbl">Nope</span>
      </button>
    </div>

    <button class="tool picks-btn" id="picksBtn" title="My picks (P)">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      <span class="lbl">My picks</span><span class="badge" id="picksBadge">0</span>
    </button>
  </div>

  <div class="row2" id="pills"></div>
</header>

<div class="stage" id="stage">
  <div class="loading" id="loading"><div class="spin"></div></div>
  <div class="hint" id="hint">
    <span><kbd>&larr;</kbd> <kbd>&rarr;</kbd> switch</span><span><kbd>L</kbd> like</span><span><kbd>D</kbd> dislike</span>
  </div>
</div>

<!-- picks overlay -->
<div class="overlay" id="overlay">
  <div class="panel">
    <div class="panel-head">
      <h2>Your picks</h2>
      <button class="x" id="closePicks"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="panel-body" id="picksBody"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const THEMES = [
  {n:"01", file:"../designs/theme-01-heritage.html", title:"Heritage Club", sw:"#d8a94f", sw2:"#c2492e"},
  {n:"02", file:"../designs/theme-02-point.html", title:"The Point", sw:"#d8431f", sw2:"#e0c08a"},
  {n:"03", file:"../designs/theme-03-editorial.html", title:"Editorial", sw:"#8a2b2b", sw2:"#1f1c17"},
  {n:"04", file:"../designs/theme-04-arcade.html", title:"Arcade HUD", sw:"#22e0ff", sw2:"#ff3df0"},
  {n:"05", file:"../designs/theme-05-swiss.html", title:"Swiss Minimal", sw:"#e0231a", sw2:"#121210"},
  {n:"06", file:"../designs/theme-06-wood.html", title:"Wood & Leather", sw:"#c79a52", sw2:"#9c5a2c"},
  {n:"07", file:"../designs/theme-07-royal.html", title:"Royal Burgundy", sw:"#e3b54e", sw2:"#a82a44"},
  {n:"08", file:"../designs/theme-08-deco.html", title:"Art Deco", sw:"#d9b25a", sw2:"#1f7a5c"},
  {n:"09", file:"../designs/theme-09-pastel.html", title:"Soft Pastel", sw:"#f17a6a", sw2:"#4fb3a6"},
  {n:"10", file:"../designs/theme-10-retro.html", title:"Retro Poster", sw:"#e0a32e", sw2:"#2a9d8f"},
  {n:"11", file:"../designs/theme-11-mono.html", title:"Monochrome", sw:"#fafafa", sw2:"#888888"},
  {n:"12", file:"../designs/theme-12-saas.html", title:"Modern SaaS", sw:"#6366f1", sw2:"#a855f7"},
  {n:"13", file:"../designs/theme-13-terminal.html", title:"Terminal", sw:"#4ade80", sw2:"#9aa7b2"},
  {n:"14", file:"../designs/theme-14-brutal.html", title:"Brutalist", sw:"#ffe600", sw2:"#111111"},
  {n:"15", file:"../designs/theme-15-botanical.html", title:"Botanical", sw:"#5a7d52", sw2:"#c98a4b"},
  {n:"16", file:"../designs/theme-16-blueprint.html", title:"Blueprint", sw:"#4da6ff", sw2:"#e8eef7"},
  {n:"17", file:"../designs/theme-17-copper.html", title:"Copper Forge", sw:"#c9743f", sw2:"#8a8a86"},
  {n:"18", file:"../designs/theme-18-oxblood.html", title:"Oxblood Academia", sw:"#7d2b34", sw2:"#b5915a"},
  {n:"19", file:"../designs/theme-19-aurora.html", title:"Aurora", sw:"#5eead4", sw2:"#a78bfa"},
  {n:"20", file:"../designs/theme-20-goldnoir.html", title:"Gold Noir", sw:"#d4af37", sw2:"#f5f5f5"},
  {n:"21", file:"../designs/theme-21-cyber.html", title:"Cyber Slate", sw:"#3b82f6", sw2:"#22d3ee"},
  {n:"22", file:"../designs/theme-22-vapor.html", title:"Vaporwave", sw:"#ff5fd2", sw2:"#5ed0ff"},
  {n:"23", file:"../designs/theme-23-forest.html", title:"Forest Deep", sw:"#34d399", sw2:"#6ee7b7"},
  {n:"24", file:"../designs/theme-24-nordic.html", title:"Nordic Frost", sw:"#6b9fc4", sw2:"#c3d2de"},
  {n:"25", file:"../designs/theme-25-memphis.html", title:"Memphis", sw:"#ff4b3e", sw2:"#00c2b8"},
  {n:"26", file:"../designs/theme-26-sumi.html", title:"Sumi-e Ink", sw:"#1a1a1a", sw2:"#c0392b"},
  {n:"27", file:"../designs/theme-27-bauhaus.html", title:"Bauhaus", sw:"#e63946", sw2:"#1d5fbf"},
  {n:"28", file:"../designs/theme-28-sandstone.html", title:"Sandstone", sw:"#c4622d", sw2:"#d9a441"},
  {n:"29", file:"../designs/theme-29-ivory.html", title:"Ivory Luxe", sw:"#b8962e", sw2:"#2a2620"},
  {n:"30", file:"../designs/theme-30-concrete.html", title:"Concrete", sw:"#8a8880", sw2:"#b5b2a8"},
  {n:"31", file:"../designs/theme-31-candy.html", title:"Candy Pop", sw:"#ff4fa3", sw2:"#7c5cff"},
  {n:"32", file:"../designs/theme-32-sunrise.html", title:"Sunrise", sw:"#ff8a3d", sw2:"#ffc24b"},
  {n:"33", file:"../designs/theme-33-riso.html", title:"Risograph", sw:"#2540ff", sw2:"#ff6f3c"},
  {n:"34", file:"../designs/theme-34-constructivist.html", title:"Constructivist", sw:"#d81e1e", sw2:"#f2ebdd"},
  {n:"35", file:"../designs/theme-35-popart.html", title:"Pop Art", sw:"#ffcf00", sw2:"#e0245e"},
  {n:"36", file:"../designs/theme-36-eames.html", title:"Mid-Century", sw:"#e0a02c", sw2:"#2a8a7a"},
  {n:"37", file:"../designs/theme-37-nouveau.html", title:"Art Nouveau", sw:"#9a7bb0", sw2:"#b79b54"},
  {n:"38", file:"../designs/theme-38-zine.html", title:"Zine Punk", sw:"#ff2b2b", sw2:"#1a1a1a"},
  {n:"39", file:"../designs/theme-39-psych.html", title:"Psychedelic", sw:"#ff5a1f", sw2:"#d43a8c"},
  {n:"40", file:"../designs/theme-40-ukiyo.html", title:"Ukiyo-e", sw:"#2a4d8f", sw2:"#e07a5f"},
  {n:"41", file:"../designs/theme-41-destijl.html", title:"De Stijl", sw:"#d4212a", sw2:"#f4c20d"},
  {n:"42", file:"../designs/theme-42-press.html", title:"Literary Press", sw:"#e8541e", sw2:"#2a2a2a"},
];

const KEY = "gammon-theme-verdicts-v1";
let verdicts = {};
try { verdicts = JSON.parse(localStorage.getItem(KEY)) || {}; } catch(e){ verdicts = {}; }
const save = () => { try{ localStorage.setItem(KEY, JSON.stringify(verdicts)); }catch(e){} };

let cur = 0;
const frames = {};                       // cache: index -> iframe element
const $ = id => document.getElementById(id);
const stage = $("stage"), loading = $("loading"), pillsEl = $("pills");
const markFor = id => verdicts[id]==='like' ? '✓' : (verdicts[id]==='dislike' ? '✕' : '');

function buildPills(){
  pillsEl.innerHTML = "";
  THEMES.forEach((t,i)=>{
    const b = document.createElement("button");
    b.className = "pill";
    b.dataset.i = i;
    b.innerHTML = `<span class="sw" style="background:linear-gradient(135deg,${t.sw} 0 50%,${t.sw2} 50% 100%)"></span><span class="num">${t.n}</span> ${t.title}
      <span class="mark">${markFor(t.n)}</span>`;
    b.addEventListener("click", ()=>show(i));
    pillsEl.appendChild(b);
  });
}

function show(i){
  cur = (i + THEMES.length) % THEMES.length;
  const t = THEMES[cur];

  // lazy-create & cache iframe so switching back is instant
  if(!frames[cur]){
    loading.classList.remove("hide");
    const f = document.createElement("iframe");
    f.title = t.title;
    f.addEventListener("load", ()=> loading.classList.add("hide"));
    f.src = t.file;
    stage.appendChild(f);
    frames[cur] = f;
  } else {
    loading.classList.add("hide");
  }
  Object.values(frames).forEach(f=>f.classList.remove("show"));
  frames[cur].classList.add("show");

  // header
  $("curIdx").textContent = t.n;
  $("curName").textContent = t.title;
  $("curSub").textContent = t.sub || (t.n + " of " + THEMES.length + " designs");

  // pills active + verdict state
  [...pillsEl.children].forEach((p,idx)=>{
    const id = THEMES[idx].n;
    p.classList.toggle("active", idx===cur);
    p.classList.toggle("liked", verdicts[id]==='like');
    p.classList.toggle("disliked", verdicts[id]==='dislike');
    p.querySelector(".mark").textContent = markFor(id);
  });
  const active = pillsEl.children[cur];
  if(active) active.scrollIntoView({behavior:"smooth",block:"nearest",inline:"center"});

  refreshVerdictButtons();
  history.replaceState(null,"","#"+t.n);
}

function refreshVerdictButtons(){
  const v = verdicts[THEMES[cur].n];
  $("likeBtn").classList.toggle("on", v==='like');
  $("dislikeBtn").classList.toggle("on", v==='dislike');
  $("picksBadge").textContent = Object.values(verdicts).filter(x=>x==='like').length;
}

function setVerdict(v){
  const id = THEMES[cur].n;
  verdicts[id] = (verdicts[id]===v) ? undefined : v;   // toggle off if pressed again
  if(verdicts[id]===undefined) delete verdicts[id];
  save();
  const p = pillsEl.children[cur];
  p.classList.toggle("liked", verdicts[id]==='like');
  p.classList.toggle("disliked", verdicts[id]==='dislike');
  p.querySelector(".mark").textContent = markFor(id);
  refreshVerdictButtons();
}

/* ---- picks panel ---- */
function openPicks(){
  const liked = THEMES.filter(t=>verdicts[t.n]==='like');
  const disliked = THEMES.filter(t=>verdicts[t.n]==='dislike');
  const undecided = THEMES.filter(t=>!verdicts[t.n]);
  const rowHtml = t => `<div class="prow">
      <span class="sw" style="background:linear-gradient(135deg,${t.sw} 0 50%,${t.sw2} 50% 100%)"></span>
      <span class="pn"><b>${t.n} &middot; ${t.title}</b><span>${t.sub||""}</span></span>
      <button class="go" data-jump="${THEMES.indexOf(t)}">View</button></div>`;
  const sec = (label,arr,color) => `<div class="pcol"><h3><span style="color:${color}">&#9679;</span> ${label} <span style="color:var(--muted)">(${arr.length})</span></h3>
      ${arr.length? arr.map(rowHtml).join("") : '<div class="empty">Nothing here yet.</div>'}</div>`;
  $("picksBody").innerHTML =
      sec("Liked", liked, "var(--like)") +
      sec("Disliked", disliked, "var(--dislike)") +
      sec("Undecided", undecided, "var(--muted)") +
      `<div class="panel-actions">
        <button class="pa primary" id="copyBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg> Copy summary</button>
        <button class="pa danger" id="resetBtn"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg> Reset all</button>
      </div>`;
  $("picksBody").querySelectorAll("[data-jump]").forEach(el=>el.addEventListener("click",()=>{ show(+el.dataset.jump); closePicks(); }));
  $("copyBtn").addEventListener("click", copySummary);
  $("resetBtn").addEventListener("click", ()=>{ if(confirm("Clear all your likes and dislikes?")){ verdicts={}; save(); buildPills(); show(cur); openPicks(); }});
  $("overlay").classList.add("open");
}
function closePicks(){ $("overlay").classList.remove("open"); }

function copySummary(){
  const line = arr => arr.length ? arr.map(x=>"  • "+x).join("\n") : "  —";
  const liked = THEMES.filter(t=>verdicts[t.n]==='like').map(t=>`${t.n} ${t.title}`);
  const disliked = THEMES.filter(t=>verdicts[t.n]==='dislike').map(t=>`${t.n} ${t.title}`);
  const txt = `Gammon theme picks\n\nLIKED (${liked.length}):\n${line(liked)}\n\nDISLIKED (${disliked.length}):\n${line(disliked)}`;
  const done = ()=>toast("Summary copied to clipboard");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(done).catch(()=>prompt("Copy your picks:", txt));
  } else { prompt("Copy your picks:", txt); }
}
let toastT;
function toast(msg){ const el=$("toast"); el.textContent=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1900); }

/* ---- wire up ---- */
$("prev").addEventListener("click",()=>show(cur-1));
$("next").addEventListener("click",()=>show(cur+1));
$("likeBtn").addEventListener("click",()=>setVerdict('like'));
$("dislikeBtn").addEventListener("click",()=>setVerdict('dislike'));
$("picksBtn").addEventListener("click",openPicks);
$("closePicks").addEventListener("click",closePicks);
$("overlay").addEventListener("click",e=>{ if(e.target===$("overlay")) closePicks(); });

document.addEventListener("keydown",e=>{
  if($("overlay").classList.contains("open")){ if(e.key==="Escape") closePicks(); return; }
  const k = e.key.toLowerCase();
  if(e.key==="ArrowLeft") show(cur-1);
  else if(e.key==="ArrowRight") show(cur+1);
  else if(k==="l") setVerdict('like');
  else if(k==="d") setVerdict('dislike');
  else if(k==="p") openPicks();
});

// dismiss hint after first interaction / timeout
["click","keydown"].forEach(ev=>window.addEventListener(ev,()=>$("hint").classList.add("gone"),{once:true}));
setTimeout(()=>$("hint").classList.add("gone"), 6000);

// init (respect #NN in URL)
buildPills();
const startN = (location.hash||"").replace("#","");
const found = THEMES.findIndex(t=>t.n===startN);
show(found===-1?0:found);
</script>
</body>
